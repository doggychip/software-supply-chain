*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

--text-sm:clamp(.8rem,.75rem+.25vw,.9rem);
--text-base:clamp(.9rem,.85rem+.25vw,1rem);
--text-lg:clamp(1rem,.9rem+.5vw,1.3rem);
--text-xl:clamp(1.3rem,1rem+1vw,1.9rem);
--space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;
--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;
--radius-sm:.3rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;
--font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
--ease:180ms cubic-bezier(.16,1,.3,1);
}
[data-theme="dark"]{
--bg:#0d0f14;--surface:#13151d;--s2:#181a24;--s3:#1c1f2a;--s4:#22253a;
--div:#252836;--border:#2e3148;
--text:#dde0f0;--muted:#7a7e96;--faint:#454868;
--primary:#5b9cf6;--pri-h:#3b7de8;
--success:#56cc84;--warn:#f0ad4e;--error:#f07070;
--cyan:#56d4e8;--purple:#a87ef0;--orange:#f5a454;--gold:#e8c44a;
--green:#56cc84;--red:#f07070;--blue:#5b9cf6;--teal:#4fc4cf;
--shadow:0 4px 20px rgba(0,0,0,.5);--shadow-sm:0 1px 4px rgba(0,0,0,.3);
}
[data-theme="light"]{
--bg:#f2f3f7;--surface:#fff;--s2:#f8f9fc;--s3:#eef0f6;--s4:#e5e8f0;
--div:#dde1ec;--border:#ccd0e0;
--text:#1a1d2e;--muted:#5c617a;--faint:#9498b0;
--primary:#2563eb;--pri-h:#1d50cc;
--success:#2d7a4a;--warn:#b45309;--error:#c0392b;
--cyan:#0891b2;--purple:#7c3aed;--orange:#c2570a;--gold:#b45309;
--green:#2d7a4a;--red:#c0392b;--blue:#2563eb;--teal:#0f766e;
--shadow:0 4px 20px rgba(0,0,0,.1);--shadow-sm:0 1px 4px rgba(0,0,0,.06);
}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--text);background:var(--bg);display:flex;flex-direction:column;overflow:hidden;height:100vh}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a{color:inherit;text-decoration:none}

/* Dash Nav */
.dash-nav{display:flex;gap:2px;background:var(--s2);padding:4px var(--space-4);border-bottom:1px solid var(--border);flex-shrink:0}
.dash-nav button{padding:4px 14px;font-size:10px;font-weight:700;color:var(--muted);border-radius:var(--radius-sm);letter-spacing:.04em;text-transform:uppercase}
.dash-nav button:hover{color:var(--text);background:var(--s3)}
.dash-nav button.active{color:var(--primary);background:color-mix(in srgb,var(--primary) 12%,transparent)}

/* Back link + header area */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-6);border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.back-link{display:inline-flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);font-weight:600;color:var(--muted);transition:color .2s}
.back-link:hover{color:var(--primary)}
.top-right{display:flex;align-items:center;gap:var(--space-3)}

/* Theme/Lang toggles */
.theme-toggle{width:34px;height:34px;border-radius:var(--radius-md);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;background:var(--surface)}
.theme-toggle:hover{background:var(--s3)}
.lang-toggle{width:34px;height:34px;border-radius:var(--radius-md);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;background:var(--surface);color:var(--muted)}
.lang-toggle:hover{background:var(--s3);color:var(--text)}

/* Page header */
.news-header{padding:var(--space-6) var(--space-6) 0;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:var(--space-3)}
.news-title{font-size:var(--text-xl);font-weight:700;letter-spacing:-.02em}
.news-meta{display:flex;align-items:center;gap:var(--space-4);margin-top:var(--space-1)}
.news-timestamp{font-size:var(--text-xs);color:var(--muted)}
.auto-refresh{display:inline-flex;align-items:center;gap:var(--space-1);font-size:10px;color:var(--green);font-weight:600}
.auto-refresh .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Search box */
.search-box{position:relative;width:280px}
.search-box input{width:100%;padding:8px 12px 8px 34px;font-size:var(--text-xs);font-family:var(--font-body);background:var(--s2);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text);outline:none;transition:border-color .2s}
.search-box input:focus{border-color:var(--primary)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted)}

/* Category filters */
.filter-bar{display:flex;gap:var(--space-2);padding:var(--space-4) var(--space-6);overflow-x:auto;flex-shrink:0}
.filter-btn{padding:6px 14px;font-size:var(--text-xs);font-weight:600;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-btn:hover{background:var(--s3);color:var(--text)}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* Main layout */
.news-layout{display:flex;flex:1;overflow:hidden;gap:0}
.news-feed{flex:1;overflow-y:auto;padding:0 var(--space-6) var(--space-6)}
.news-sidebar{width:300px;flex-shrink:0;border-left:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:var(--space-5)}

/* News cards */
.news-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--space-5);margin-bottom:var(--space-4);transition:transform .2s,box-shadow .2s;opacity:0;animation:cardIn .4s ease forwards}
.news-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.news-card-header{display:flex;align-items:flex-start;gap:var(--space-3)}
.source-icon{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.news-card-content{flex:1;min-width:0}
.news-card-title{font-size:var(--text-sm);font-weight:700;line-height:1.4;margin-bottom:var(--space-1);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-card-title a{color:var(--text);text-decoration:none;transition:color .2s}
.news-card-title a:hover{color:var(--primary)}
.news-card-source{display:flex;align-items:center;gap:var(--space-2);font-size:10px;color:var(--muted);margin-bottom:var(--space-2)}
.news-card-source .sep{color:var(--faint)}
.category-badge{display:inline-flex;padding:2px 8px;font-size:9px;font-weight:700;border-radius:var(--radius-sm);letter-spacing:.02em;text-transform:uppercase}
.news-card-excerpt{font-size:var(--text-xs);color:var(--muted);line-height:1.6;margin:var(--space-2) 0;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.news-card-footer{display:flex;align-items:center;gap:var(--space-3);margin-top:var(--space-3);flex-wrap:wrap}
.sentiment{font-size:10px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.sentiment.bullish{color:var(--green)}
.sentiment.bearish{color:var(--red)}
.sentiment.neutral{color:var(--muted)}
.ticker-badge{display:inline-flex;padding:2px 6px;font-size:9px;font-weight:700;font-family:var(--font-mono);border-radius:var(--radius-sm);background:var(--s3);color:var(--muted);letter-spacing:.03em}
.ticker-badge:hover{background:var(--s4);color:var(--text)}

/* Card entrance animation */
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Load more */
.load-more-wrap{text-align:center;padding:var(--space-4)}
.load-more-btn{padding:10px 28px;font-size:var(--text-xs);font-weight:600;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .2s}
.load-more-btn:hover{background:var(--s3);color:var(--text)}

/* Sidebar sections */
.sidebar-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:var(--space-3)}
.sidebar-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--space-4);margin-bottom:var(--space-4)}

/* Trending topics */
.trending-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--div);font-size:var(--text-xs)}
.trending-item:last-child{border-bottom:none}
.trending-topic{font-weight:600;color:var(--text)}
.trending-count{font-size:10px;color:var(--muted);font-family:var(--font-mono)}

/* Discussed tickers */
.discussed-tickers{display:flex;flex-wrap:wrap;gap:var(--space-2)}
.discussed-ticker{display:flex;align-items:center;gap:4px;padding:4px 8px;background:var(--s3);border-radius:var(--radius-sm);font-size:10px;font-weight:600;font-family:var(--font-mono);color:var(--text)}
.discussed-ticker .count{color:var(--muted);font-weight:400}

/* Market pulse */
.pulse-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--div);font-size:var(--text-xs)}
.pulse-item:last-child{border-bottom:none}
.pulse-label{font-weight:600}
.pulse-value{font-family:var(--font-mono);font-weight:600}
.pulse-up{color:var(--green)}
.pulse-down{color:var(--red)}

/* No results */
.no-results{text-align:center;padding:var(--space-12);color:var(--muted);font-size:var(--text-sm)}

/* Responsive */
@media(max-width:1024px){
  .news-sidebar{display:none}
  .search-box{width:200px}
}
@media(max-width:600px){
  .news-header{padding:var(--space-4)}
  .filter-bar{padding:var(--space-3) var(--space-4)}
  .news-feed{padding:0 var(--space-4) var(--space-4)}
  .search-box{width:100%}
}
</style>
</head>

/* ── Category colors ── */
var CATEGORY_COLORS = {
  'AI / Machine Learning': 'var(--purple)',
  'Semiconductors': 'var(--blue)',
  'Cloud & Data Centers': 'var(--cyan)',
  'Earnings & Markets': 'var(--green)',
  'Geopolitics & Trade': 'var(--warn)'
};
var CATEGORY_BG = {
  'AI / Machine Learning': 'color-mix(in srgb, var(--purple) 15%, transparent)',
  'Semiconductors': 'color-mix(in srgb, var(--blue) 15%, transparent)',
  'Cloud & Data Centers': 'color-mix(in srgb, var(--cyan) 15%, transparent)',
  'Earnings & Markets': 'color-mix(in srgb, var(--green) 15%, transparent)',
  'Geopolitics & Trade': 'color-mix(in srgb, var(--warn) 15%, transparent)'
};

var SOURCE_COLORS = {
  'Reuters': '#f5714a',
  'Bloomberg': '#7c3aed',
  'Nikkei Asia': '#e84393',
  'Wall Street Journal': '#6c757d',
  'Financial Times': '#e8a87c',
  'CNBC': '#005596',
  'The Verge': '#e84393',
  "Barron's": '#1a6b3c',
  'Seeking Alpha': '#f57c00',
  'MarketWatch': '#339933',
  'TechCrunch': '#0a9c00',
  "Tom's Hardware": '#e53935',
  'Korea Economic Daily': '#1565c0',
  'South China Morning Post': '#f9a825',
  'Electronic Engineering Times': '#0277bd',
  "Investor's Business Daily": '#283593',
  'The Information': '#555',
  'EE Times': '#0277bd',
  'Semiconductor Engineering': '#00838f',
  'Politico': '#e53935'
};

/* ── State ── */
var allNews = SAMPLE_NEWS;
var currentCategory = 'all';
var searchTerm = '';
var displayCount = 10;
var ITEMS_PER_PAGE = 10;

/* ── Time helpers ── */
function timeAgo(ts) {
  var diff = Date.now() - new Date(ts).getTime();
  var mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return mins + 'm ago';
  var hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  var days = Math.floor(hrs / 24);
  return days + 'd ago';
}

function updateTimestamp() {
  var now = new Date();
  document.getElementById('liveTimestamp').textContent = now.toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'}) + ' · ' + now.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
}

/* ── Render cards ── */
function getFiltered() {
  return allNews.filter(function(item) {
    var catMatch = currentCategory === 'all' || item.category === currentCategory;
    var searchMatch = !searchTerm || item.title.toLowerCase().indexOf(searchTerm) !== -1 || item.excerpt.toLowerCase().indexOf(searchTerm) !== -1 || item.source.toLowerCase().indexOf(searchTerm) !== -1 || item.tickers.some(function(t) { return t.toLowerCase().indexOf(searchTerm) !== -1; });
    return catMatch && searchMatch;
  });
}

function renderCards() {
  var feed = document.getElementById('newsFeed');
  var wrap = document.getElementById('loadMoreWrap');
  // Remove existing cards
  var oldCards = feed.querySelectorAll('.news-card, .no-results');
  oldCards.forEach(function(c){ c.remove(); });

  var filtered = getFiltered();
  var toShow = filtered.slice(0, displayCount);

  if (toShow.length === 0) {
    var noRes = document.createElement('div');
    noRes.className = 'no-results';
    noRes.textContent = 'No news found matching your criteria.';
    feed.insertBefore(noRes, wrap);
    wrap.style.display = 'none';
    return;
  }

  toShow.forEach(function(item, i) {
    var card = document.createElement('div');
    card.className = 'news-card';
    card.style.animationDelay = (i * 0.05) + 's';

    var iconColor = SOURCE_COLORS[item.source] || 'var(--primary)';
    var iconLetter = item.source.charAt(0);
    var catColor = CATEGORY_COLORS[item.category] || 'var(--muted)';
    var catBg = CATEGORY_BG[item.category] || 'var(--s3)';

    var sentimentIcon = item.sentiment === 'bullish' ? '🟢' : item.sentiment === 'bearish' ? '🔴' : '⚪';
    var sentimentLabel = item.sentiment === 'bullish' ? 'Bullish' : item.sentiment === 'bearish' ? 'Bearish' : 'Neutral';

    var tickerHtml = item.tickers.map(function(t) {
      return '<span class="ticker-badge">' + t + '</span>';
    }).join('');

    card.innerHTML =
      '<div class="news-card-header">' +
        '<div class="source-icon" style="background:' + iconColor + '">' + iconLetter + '</div>' +
        '<div class="news-card-content">' +
          '<div class="news-card-title"><a href="' + item.url + '" target="_blank" rel="noopener">' + item.title + '</a></div>' +
          '<div class="news-card-source"><span>' + item.source + '</span><span class="sep">&middot;</span><span>' + timeAgo(item.timestamp) + '</span></div>' +
          '<span class="category-badge" style="color:' + catColor + ';background:' + catBg + '">' + item.category + '</span>' +
          '<p class="news-card-excerpt">' + item.excerpt + '</p>' +
          '<div class="news-card-footer">' +
            '<span class="sentiment ' + item.sentiment + '">' + sentimentIcon + ' ' + sentimentLabel + '</span>' +
            tickerHtml +
          '</div>' +
        '</div>' +
      '</div>';

    feed.insertBefore(card, wrap);
  });

  wrap.style.display = (displayCount < filtered.length) ? '' : 'none';
}

/* ── Sidebar ── */
function renderSidebar() {
  // Trending topics
  var topics = [
    { topic: 'AI Infrastructure Spending', count: 18 },
    { topic: 'EUV Lithography Demand', count: 14 },
    { topic: 'HBM4 Memory Supply', count: 12 },
    { topic: 'China Chip Restrictions', count: 11 },
    { topic: 'N2 / 2nm Process Node', count: 9 }
  ];
  var tHtml = '';
  topics.forEach(function(t) {
    tHtml += '<div class="trending-item"><span class="trending-topic">' + t.topic + '</span><span class="trending-count">' + t.count + ' mentions</span></div>';
  });
  document.getElementById('trendingTopics').innerHTML = tHtml;

  // Most discussed tickers
  var tickerCounts = {};
  allNews.forEach(function(item) {
    item.tickers.forEach(function(t) {
      tickerCounts[t] = (tickerCounts[t] || 0) + 1;
    });
  });
  var sorted = Object.keys(tickerCounts).sort(function(a, b) { return tickerCounts[b] - tickerCounts[a]; }).slice(0, 10);
  var dHtml = '';
  sorted.forEach(function(t) {
    dHtml += '<div class="discussed-ticker"><span>' + t + '</span><span class="count">&times;' + tickerCounts[t] + '</span></div>';
  });
  document.getElementById('discussedTickers').innerHTML = dHtml;

  // Market pulse
  var pulse = [
    { label: 'SOX Index', value: '+1.8%', up: true },
    { label: 'NASDAQ', value: '+0.9%', up: true },
    { label: 'S&P 500', value: '+0.4%', up: true }
  ];
  var pHtml = '';
  pulse.forEach(function(p) {
    var cls = p.up ? 'pulse-up' : 'pulse-down';
    var arrow = p.up ? '&#9650;' : '&#9660;';
    pHtml += '<div class="pulse-item"><span class="pulse-label">' + p.label + '</span><span class="pulse-value ' + cls + '">' + arrow + ' ' + p.value + '</span></div>';
  });
  document.getElementById('marketPulse').innerHTML = pHtml;
}

/* ── Filter logic ── */
document.getElementById('filterBar').addEventListener('click', function(e) {
  var btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  currentCategory = btn.getAttribute('data-category');
  displayCount = ITEMS_PER_PAGE;
  renderCards();
});

/* ── Search ── */
var searchTimeout;
document.getElementById('searchInput').addEventListener('input', function(e) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(function() {
    searchTerm = e.target.value.toLowerCase().trim();
    displayCount = ITEMS_PER_PAGE;
    renderCards();
  }, 250);
});

/* ── Load More ── */
document.getElementById('loadMoreBtn').addEventListener('click', function() {
  displayCount += ITEMS_PER_PAGE;
  renderCards();
});

/* ── Fetch from API with fallback ── */
function fetchNews() {
  fetch('/api/news')
    .then(function(r) { if (!r.ok) throw new Error('API error'); return r.json(); })
    .then(function(data) {
      if (Array.isArray(data) && data.length > 0) {
        allNews = data;
      }
      renderCards();
      renderSidebar();
    })
    .catch(function() {
      // Use sample data
      allNews = SAMPLE_NEWS;
      renderCards();
      renderSidebar();
    });
}

/* ── Init ── */
updateTimestamp();
setInterval(updateTimestamp, 60000);
fetchNews();
setInterval(fetchNews, 300000); // 5 min auto-refresh
</script>
